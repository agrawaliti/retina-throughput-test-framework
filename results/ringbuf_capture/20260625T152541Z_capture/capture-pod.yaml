apiVersion: v1
kind: Pod
metadata:
  name: ringbuf-capture-20260625t152541z
  namespace: default
spec:
  hostPID: true
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: aks-usr32-25342902-vmss000000
  containers:
  - name: capture
    image: ubuntu:22.04
    securityContext:
      privileged: true
    command: ["/bin/bash", "-c"]
    args:
      - |
        set -euo pipefail
        echo "=== capture starting ==="

        # Use the host's own perf binary.
        # /usr/lib is mounted at /host-usr-lib so relative symlinks resolve:
        #   /host-usr-lib/linux-tools/<kernel>/perf -> ../../linux-azure-tools-*/perf
        HOST_KERNEL=$(uname -r)
        PERF_BIN=/host-usr-lib/linux-tools/${HOST_KERNEL}/perf
        if [[ ! -x "$PERF_BIN" ]]; then
          # fallback: find a real perf binary (not a broken symlink)
          PERF_BIN=$(find /host-usr-lib -name perf -type f 2>/dev/null | head -1 || true)
        fi
        if [[ -z "$PERF_BIN" || ! -x "$PERF_BIN" ]]; then
          echo "ERROR: perf binary not found under /host-usr-lib (kernel=$HOST_KERNEL)" >&2
          ls -lR /host-usr-lib/linux-tools/ >&2 || true
          exit 1
        fi
        echo "perf: $PERF_BIN"

        # bpftool from host /usr/sbin
        BPFTOOL_BIN=/host-sbin/bpftool
        if [[ ! -x "$BPFTOOL_BIN" ]]; then
          BPFTOOL_BIN=$(find /host-sbin -maxdepth 1 -name 'bpftool*' -type f 2>/dev/null | head -1 || true)
        fi
        if [[ -z "$BPFTOOL_BIN" || ! -x "$BPFTOOL_BIN" ]]; then
          echo "WARNING: bpftool not found, skipping bpf snapshots"
          BPFTOOL_BIN=""
        else
          echo "bpftool: $BPFTOOL_BIN"
        fi

        # Install flamegraph scripts (small, no kernel deps)
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq 2>&1 | tail -1
        apt-get install -y --no-install-recommends flamegraph perl 2>&1 | tail -3 || true
        FG_COLLAPSE=$(command -v stackcollapse-perf.pl 2>/dev/null || true)
        FG_RENDER=$(command -v flamegraph.pl 2>/dev/null || true)
        echo "stackcollapse-perf.pl: ${FG_COLLAPSE:-not found}"
        echo "flamegraph.pl: ${FG_RENDER:-not found}"

        mkdir -p /capture
        TS=$(date -u +%Y%m%dT%H%M%SZ)
        RUN_DIR=/capture/$TS
        mkdir -p "$RUN_DIR"

        echo capture_tag=ringbuf > "$RUN_DIR/meta.env"
        echo node=aks-usr32-25342902-vmss000000          >> "$RUN_DIR/meta.env"
        echo nic=enP40153s1                 >> "$RUN_DIR/meta.env"
        echo kernel=$HOST_KERNEL                 >> "$RUN_DIR/meta.env"
        echo perf=$PERF_BIN                      >> "$RUN_DIR/meta.env"

        cat /proc/softirqs   > "$RUN_DIR/softirqs.before.txt"
        cat /proc/interrupts > "$RUN_DIR/interrupts.before.txt"

        if [[ -n "$BPFTOOL_BIN" ]]; then
          "$BPFTOOL_BIN" prog show > "$RUN_DIR/bpftool.prog.before.txt" 2>&1 || true
          "$BPFTOOL_BIN" map  show > "$RUN_DIR/bpftool.map.before.txt"  2>&1 || true
          "$BPFTOOL_BIN" link show > "$RUN_DIR/bpftool.link.before.txt" 2>&1 || true
          "$BPFTOOL_BIN" net  show > "$RUN_DIR/bpftool.net.before.txt"  2>&1 || true
        fi

        echo "starting perf record (30s) ..."
        "$PERF_BIN" record -a -g --call-graph dwarf -F 99 \
          -o "$RUN_DIR/perf.data" -- sleep 30 \
          >/dev/null 2>&1 &
        PERF_PID=$!

        printf '%s\n' 'timestamp,net_rx_total,net_tx_total' > "$RUN_DIR/samples.csv"
        END_TIME=$((SECONDS + 30))
        while [[ $SECONDS -lt $END_TIME ]]; do
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NET_RX=$(awk '/NET_RX/ {s=0; for(i=2;i<=NF;i++) s+=$i; print s}' /proc/softirqs)
          NET_TX=$(awk '/NET_TX/ {s=0; for(i=2;i<=NF;i++) s+=$i; print s}' /proc/softirqs)
          printf '%s,%s,%s\n' "$NOW" "$NET_RX" "$NET_TX" >> "$RUN_DIR/samples.csv"
          sleep 1
        done

        echo "waiting for perf to finish ..."
        wait "$PERF_PID"
        echo "perf done. generating perf.script.txt ..."
        "$PERF_BIN" script -i "$RUN_DIR/perf.data" > "$RUN_DIR/perf.script.txt"

        if [[ -n "$FG_COLLAPSE" && -n "$FG_RENDER" ]]; then
          echo "generating flamegraph ..."
          "$FG_COLLAPSE" < "$RUN_DIR/perf.script.txt" > "$RUN_DIR/perf.folded.txt"
          "$FG_RENDER" "$RUN_DIR/perf.folded.txt" > "$RUN_DIR/flamegraph.svg"
          echo "flamegraph written: $RUN_DIR/flamegraph.svg"
        else
          echo "WARNING: flamegraph tools not found; skipping SVG generation"
        fi

        if [[ -n "$BPFTOOL_BIN" ]]; then
          "$BPFTOOL_BIN" prog show > "$RUN_DIR/bpftool.prog.after.txt" 2>&1 || true
          "$BPFTOOL_BIN" map  show > "$RUN_DIR/bpftool.map.after.txt"  2>&1 || true
          "$BPFTOOL_BIN" link show > "$RUN_DIR/bpftool.link.after.txt" 2>&1 || true
          "$BPFTOOL_BIN" net  show > "$RUN_DIR/bpftool.net.after.txt"  2>&1 || true
        fi

        cat /proc/softirqs   > "$RUN_DIR/softirqs.after.txt"
        cat /proc/interrupts > "$RUN_DIR/interrupts.after.txt"

        echo "copying results to host ..."
        cp -R "$RUN_DIR" /host-capture/
        echo "=== capture complete: /host-capture/$TS ==="
    volumeMounts:
    - name: capture
      mountPath: /capture
    - name: host-capture
      mountPath: /host-capture
    - name: host-usr-lib
      mountPath: /host-usr-lib
      readOnly: true
    - name: host-sbin
      mountPath: /host-sbin
      readOnly: true
  volumes:
  - name: capture
    emptyDir: {}
  - name: host-capture
    hostPath:
      path: /home/itiagrawal/Projects/iperf3-test/results/ringbuf_capture/20260625T152541Z_capture
      type: DirectoryOrCreate
  - name: host-usr-lib
    hostPath:
      path: /usr/lib
      type: Directory
  - name: host-sbin
    hostPath:
      path: /usr/sbin
      type: Directory
